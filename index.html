<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Geet | Technical Recruiter</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* ================= BACKGROUND ================= */

body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    color: white;
    overflow-x: hidden;

    background: linear-gradient(120deg, #4f46e5, #9333ea, #ec4899, #06b6d4);
    background-size: 300% 300%;
    animation: gradientMove 12s ease infinite;
}

@keyframes gradientMove {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

/* ================= SHAPES ================= */

.shape {
    position: fixed;
    z-index: 0;
    opacity: 0.25;
}

/* glowing blob */
.circle {
    width: 300px;
    height: 300px;
    background: radial-gradient(circle, #38bdf8, transparent);
    top: 10%;
    left: 10%;
    border-radius: 50%;
    filter: blur(60px);
}

/* rotating ring */
.ring {
    width: 250px;
    height: 250px;
    border: 2px solid rgba(255,255,255,0.3);
    border-radius: 50%;
    bottom: 15%;
    right: 10%;
    animation: rotateRing 12s linear infinite;
    box-shadow: 0 0 40px rgba(147,51,234,0.6);
}

@keyframes rotateRing {
    from {transform: rotate(0deg);}
    to {transform: rotate(360deg);}
}

/* floating dots */
.dots {
    width: 140px;
    height: 140px;
    top: 30%;
    right: 15%;
    background-image: radial-gradient(white 2px, transparent 2px);
    background-size: 20px 20px;
    animation: floatDots 6s ease-in-out infinite;
}

@keyframes floatDots {
    0%,100% {transform: translateY(0);}
    50% {transform: translateY(-15px);}
}

/* ================= LAYOUT ================= */

.navbar, .hero, .container {
    position: relative;
    z-index: 2;
}

.navbar {
    padding: 15px 40px;
}

/* ================= HERO ================= */

.hero {
    text-align: center;
    padding: 100px 20px;
}

.hero h1 {
    font-size: 64px;
    color: #fff;
    text-shadow: 0 0 20px rgba(255,255,255,0.4);
}

.hero h3 {
    opacity: 0.8;
}

/* glow behind hero */
.hero::before {
    content: "";
    position: absolute;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(147,51,234,0.5), transparent);
    top: -120px;
    left: 50%;
    transform: translateX(-50%);
    filter: blur(100px);
    z-index: -1;
}

/* ================= BUTTON ================= */

.btn {
    margin-top: 25px;
    padding: 14px 30px;
    background: linear-gradient(45deg,#38bdf8,#9333ea);
    border-radius: 30px;
    color: white;
    text-decoration: none;
}

/* ================= TYPING ================= */

.typing-line {
    display: inline-flex;
    align-items: center;
    gap: 8px;
}

.typing-mask {
    overflow: hidden;
    white-space: nowrap;
}

.cursor {
    width: 2px;
    height: 1.2em;
    background: #fff;
    animation: blink 1s infinite;
}

@keyframes blink {
    0%,50%,100% {opacity:1;}
    25%,75% {opacity:0;}
}

/* ================= SECTION ================= */

.container {
    width: 85%;
    margin: auto;
}

.section {
    margin: 80px 0;
}

/* ================= GLASS CARDS ================= */

.card {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(12px);
    padding: 25px;
    border-radius: 15px;
}

/* ================= METRICS ================= */

.metrics {
    display: flex;
    justify-content: space-around;
    text-align: center;
}

.metric h3 {
    font-size: 42px;
    color: #fff;
}

/* ================= CONTACT ================= */

.contact-card {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(12px);
    padding: 30px;
    border-radius: 15px;
    text-align: center;
}

.contact-icons {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 15px;
}

.contact-icons i {
    font-size: 22px;
}

/* ================= FOOTER ================= */

.footer {
    text-align: center;
    padding: 30px;
    background: rgba(0,0,0,0.3);
}

</style>
</head>

<body>

<!-- SHAPES -->
<div class="shape circle"></div>
<div class="shape ring"></div>
<div class="shape dots"></div>

<!-- HERO -->
<div class="hero">

<h1>Geet Chandra Singha</h1>
<h3>Senior Technical Recruiter</h3>

<h2 class="typing-line">
<span class="typing-mask"><span id="typing-text"></span></span>
<span class="cursor"></span>
</h2>

<p>Helping companies hire top tech talent across US & Canada</p>

<a href="#" class="btn">Download Resume</a>

</div>

<div class="container">

<!-- METRICS -->
<div class="section">
<div class="metrics">
<div class="metric"><h3 class="counter" data-target="8">0</h3><p>Years</p></div>
<div class="metric"><h3 class="counter" data-target="60">0</h3><p>Placements</p></div>
<div class="metric"><h3 class="counter" data-target="20">0</h3><p>Clients</p></div>
</div>
</div>

<!-- CONTACT -->
<div class="section">
<div class="contact-card">

<p>Email: geetchandrasingha@gmail.com</p>

<div class="contact-icons">
<i class="fas fa-envelope"></i>
<i class="fas fa-phone"></i>
<i class="fab fa-linkedin"></i>
</div>

<a href="#" class="btn">Contact Me</a>

</div>
</div>

</div>

<div class="footer">
© 2026 Geet
</div>

<script>

/* COUNTER */
document.querySelectorAll('.counter').forEach(c=>{
let target=+c.dataset.target, count=0;
let step=target/(5000/50);
function update(){
count+=step;
if(count<target){
c.innerText=Math.ceil(count);
setTimeout(update,50);
}else c.innerText=target+"+";
}
update();
});

/* SMOOTH REVEAL TEXT */
const texts=[
"I Help Companies Hire Top Tech Talent",
"I Deliver High-Quality Candidates, Fast",
"I Specialize in US & Canada Recruitment"
];

let i=0;

function animate(){
let textEl=document.getElementById("typing-text");
let mask=document.querySelector(".typing-mask");

textEl.textContent=texts[i];
mask.style.width="0px";

let w=textEl.scrollWidth;

mask.animate([{width:"0px"},{width:w+"px"}],
{duration:3000,easing:"ease-out",fill:"forwards"});

setTimeout(()=>{
i=(i+1)%texts.length;
animate();
},4200);
}

animate();

</script>

</body>
</html>
