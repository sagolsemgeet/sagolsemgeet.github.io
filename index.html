<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Geet | Technical Recruiter</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    color: white;
    overflow-x: hidden;

    background: linear-gradient(120deg, #4f46e5, #9333ea, #ec4899, #06b6d4);
    background-size: 300% 300%;
    animation: gradientMove 15s ease infinite;
}

@keyframes gradientMove {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

.hero {
    text-align: center;
    padding: 120px 20px;
}

.hero h1 {
    font-size: 64px;
}

.btn {
    margin-top: 20px;
    padding: 14px 28px;
    background: linear-gradient(45deg,#38bdf8,#9333ea);
    border-radius: 30px;
    text-decoration: none;
    color: white;
}

/* typing */
.typing-line {
    display: inline-flex;
    gap: 8px;
}

.cursor {
    width: 2px;
    height: 1.2em;
    background: white;
    animation: blink 1s infinite;
}

@keyframes blink {
    0%,50%,100% {opacity:1;}
    25%,75% {opacity:0;}
}

/* layout */
.container {
    width: 85%;
    margin: auto;
}

.section {
    margin: 80px 0;
}

.metrics {
    display: flex;
    justify-content: space-around;
}

.metric h3 {
    font-size: 40px;
}

/* contact */
.contact-icons {
    display: flex;
    justify-content: center;
    gap: 25px;
    margin: 20px 0;
}

.footer {
    text-align: center;
    padding: 30px;
}
</style>
</head>

<body>

<div class="hero">
<h1>Geet Chandra Singha</h1>

<h2 class="typing-line">
<span id="typing-text"></span>
<span class="cursor"></span>
</h2>

<a href="#" class="btn">Download Resume</a>
</div>

<div class="container">

<!-- METRICS -->
<div class="section">
<div class="metrics">
<div class="metric"><h3 class="counter" data-target="8">0</h3><p>Years</p></div>
<div class="metric"><h3 class="counter" data-target="60">0</h3><p>Placements</p></div>
<div class="metric"><h3 class="counter" data-target="20">0</h3><p>Clients</p></div>
</div>
</div>

<!-- CONTACT -->
<div class="section">
<h2>Contact Me</h2>

<div class="contact-icons">
<a href="mailto:geetchandrasingha@gmail.com"><i class="fas fa-envelope"></i></a>
<a href="tel:+18123562720"><i class="fas fa-phone"></i></a>
<a href="https://www.linkedin.com/in/geetchandrasingha/" target="_blank">
<i class="fab fa-linkedin"></i>
</a>
</div>

<a href="mailto:geetchandrasingha@gmail.com" class="btn">Contact Me</a>

</div>

</div>

<div class="footer">© 2026 Geet</div>

<script>

/* ===== FLUID 5-SECOND COUNTER ===== */
document.querySelectorAll('.counter').forEach(counter => {

let target = +counter.dataset.target;
let duration = 5000;
let start = null;

function animate(time) {

if (!start) start = time;

let progress = (time - start) / duration;
progress = Math.min(progress, 1);

/* smooth easing */
let ease = 1 - Math.pow(1 - progress, 3);

let value = Math.floor(ease * target);

counter.innerText = value;

if (progress < 1) {
    requestAnimationFrame(animate);
} else {
    counter.innerText = target + "+";
}

}

requestAnimationFrame(animate);

});


/* ===== TYPING (UNCHANGED) ===== */
const texts=[
"I Help Companies Hire Top Tech Talent",
"I Deliver High-Quality Candidates, Fast",
"I Specialize in US & Canada Recruitment"
];

let i=0,j=0,del=false;

function type(){
let t=texts[i];

if(!del) j+=0.2;
else j-=0.2;

document.getElementById("typing-text").textContent=t.substring(0,Math.floor(j));

if(!del && j>=t.length){del=true;setTimeout(type,1500);return;}
if(del && j<=0){del=false;i=(i+1)%texts.length;}

requestAnimationFrame(type);
}

type();

</script>

</body>
</html>
